server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA : toute route inconnue retombe sur index.html (React Router gère le routing côté client).
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Traductions : toujours revalider (l'ETag renvoie 304 si inchangé).
    # Sans ça, le navigateur applique un cache heuristique et peut servir
    # un common.json périmé après un déploiement (clés brutes affichées).
    location /locales/ {
        add_header Cache-Control "no-cache";
    }

    # index.html pointe vers les assets hashés : il ne doit jamais être caché,
    # sinon une version périmée peut référencer des bundles qui n'existent plus.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
