name: Build & Push Docker Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is on main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.ref }}" origin/main; then
            echo "❌ Tag '${{ github.ref_name }}' is NOT on the main branch. Aborting."
            exit 1
          fi
          echo "✅ Tag '${{ github.ref_name }}' is on main — proceeding."

  test:
    needs: gatekeeper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure test environment
        run: cp .env.example .env.test

      - name: Run tests
        run: npm run test -- --run

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image path
        id: image
        run: |
          echo "image=${GHCR_REPO,,}" >> $GITHUB_OUTPUT
        env:
          GHCR_REPO: ghcr.io/${{ github.repository_owner }}/nabor-front

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:${{ github.ref_name }}

  package-deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bundle deployment archive
        run: zip -r nabor-front-deploy.zip compose.prod.yml .env.example

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nabor-front-deploy.zip
